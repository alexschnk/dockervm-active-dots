services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000
    volumes:
      - /home/alex/docker/jellyfin/configs:/config
      - /home/alex/docker/jellyfin/cache:/cache
      - /home/alex/shares/metube:/metube:ro
      - /home/alex/shares/syncthing:/syncthing:ro
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.homelab.ru
    networks:
      proxy:
    labels:
      - "traefik.enable=true" 
      - "traefik.http.routers.jellyfin.entrypoints=https" 
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.homelab.ru`)"  
      - "traefik.http.routers.jellyfin.tls=true" 
      - "traefik.http.routers.jellyfin.middlewares=security-headers@file"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
networks:
  proxy:
     name: proxy 
     external: true
