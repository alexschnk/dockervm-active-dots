services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: openwebui
    volumes:
      - /home/alex/docker/openwebui/data:/app/backend/data
#    ports:
#      - ${OPEN_WEBUI_PORT-3000}:8080
    restart: unless-stopped
    networks:
      proxy:    
    env_file:
      - /home/alex/docker/openwebui/.env
    security_opt: 
      - no-new-privileges   
    environment:
      - HF_HUB_OFFLINE=1
      - RAG_EMBEDDING_ENGINE=openai
      - OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - CORS_ALLOW_ORIGIN=*
      - FORWARDED_ALLOW_IPS=*
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    labels:
      - "traefik.enable=true" # Enable Traefik on this service
      - "traefik.http.routers.openwebui.entrypoints=https" # Secure entrypoint for HTTPS
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.homelab.ru`)"  # Host rule for secure routing
      - "traefik.http.routers.openwebui.tls=true" # Enable TLS for secure connection
      - "traefik.http.routers.openwebui.middlewares=security-headers@file"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
networks:
  proxy:
    name: proxy
    external: true
