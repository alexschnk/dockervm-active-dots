http:
 #region routers 
  routers:
    pannel:
      entryPoints:
        - "https"
      rule: "Host(`pannel.homelab.ru`)"        # Change DOMAIN_NAME to yours
      middlewares:
        - security-headers
      tls: {}
      service: pannel

  services:
    pannel:
      loadBalancer:
        servers:
          - url: "https://192.168.31.204:60494"            # Change IP Address to your proxmox instance
        passHostHeader: true
