services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    volumes:
      - /home/alex/docker/uptime-kuma/data:/app/data
#      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      proxy:
    labels: 
      - "traefik.enable=true" # Enable Traefik on this service
      - "traefik.http.routers.uptime-kuma.entrypoints=https" # Secure entrypoint for HTTPS
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime-kuma.homelab.ru`)"  # Host rule for secure routing
      - "traefik.http.routers.uptime-kuma.tls=true" # Enable TLS for secure connection
      - "traefik.http.routers.uptime-kuma.middlewares=security-headers@file,authelia@docker"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
      - "traefik.http.routers.api.middlewares=authelia@docker"
#      - "traefik.http.routers.homepage.middlewares=authelia@docker"
networks:
  proxy:
    external: true
