---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Сервера:

    - Proxmox virtual environment:
        icon: proxmox.png
        href: https://pve.homelab.ru
        description: Сервер виртуализации
        widget:
          type: proxmox
          url: https://192.168.31.10:8006
          username: {{HOMEPAGE_VAR_PVE_USERNAME}}
          password: {{HOMEPAGE_VAR_PVE_API_KEY}}
          ignoreInsecure: true

    - Proxmox backup server:
        icon: proxmox.png
        href: https://pbs.homelab.ru
        description: Сервер резервного копирования VM 
        widget:
          type: proxmoxbackupserver
          url: https://192.168.31.203:8007
          username: {{HOMEPAGE_VAR_PBS_USERNAME}}
          password: {{HOMEPAGE_VAR_PBS_API_KEY}}
          ignoreInsecure: true

    - TrueNAS Scale:
        icon: truenas.png
        href: https://truenas.homelab.ru
        description: NAS
        widget:
          type: truenas
          url: https://192.168.31.201
          version: 2 # optional, defaults to 1
          enablePools: true # optional, defaults to false
          nasType: scale
          key: {{HOMEPAGE_VAR_TRUENAS_API_KEY}}

    - OpenWRT:
        icon: openwrt.png
        href: https://openwrt.homelab.ru
        description: Маршрутизатор
        widget:
          type: openwrt
          url: https://192.168.31.1
          username: {{HOMEPAGE_VAR_OWRT_USERNAME}}
          password: {{HOMEPAGE_VAR_OWRT_PASSWORD}}
#          interfaceName: br-lan # optional

